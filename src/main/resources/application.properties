# Active Profile
spring.profiles.active=dev

# Virtual Threads (Project Loom)
spring.threads.virtual.enabled=true

# Common app properties
upi.mesh.idempotency-ttl-seconds=86400
upi.mesh.packet-max-age-seconds=86400

# Velocity checking (Rate limiting per sender)
upi.mesh.velocity.max-packets=5
upi.mesh.velocity.window-seconds=300

# RSA key management
upi.mesh.rsa.enforce-provisioned=false

# Security Configurations
upi.mesh.security.api-key-header=X-Bridge-API-Key
upi.mesh.security.api-keys=${BRIDGE_API_KEYS:dev-bridge-secret-key-12345}

# Actuator & Observability
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always

# Logging configuration
logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
