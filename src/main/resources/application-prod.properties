# ============================================================
# PROD PROFILE — PostgreSQL + Redis, Flyway enabled
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=prod
# or via Docker Compose (default)
# ============================================================

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/upimesh}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:upimesh}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:upimesh_secret}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Database Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Redis for distributed idempotency
upi.mesh.redis.enabled=true
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# Security — enforce API key in production
upi.mesh.security.enforce-api-key=true
upi.mesh.security.api-keys=${BRIDGE_API_KEYS:prod-bridge-secret-change-me}

# RSA Key Management — strictly enforce provisioned keys in prod
upi.mesh.rsa.enforce-provisioned=true

# H2 console disabled in production
spring.h2.console.enabled=false

server.port=${SERVER_PORT:8080}
