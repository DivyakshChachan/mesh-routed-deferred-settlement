# ============================================================
# DEV PROFILE — H2 in-memory, no Redis, Flyway disabled
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# ============================================================

# H2 in-memory database (zero setup)
spring.datasource.url=jdbc:h2:mem:upimesh
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway for dev (H2 uses JPA auto-DDL)
spring.flyway.enabled=false

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable Redis — use in-memory ConcurrentHashMap fallback
upi.mesh.redis.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# Security — disable API key enforcement in dev
upi.mesh.security.enforce-api-key=false

server.port=8080
